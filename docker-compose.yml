# Convenience shortcut - delegates to docker/ folder
# Usage: docker-compose up -d
version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: distro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: distro_platform
      POSTGRES_USER: distro_user
      POSTGRES_PASSWORD: distro_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U distro_user -d distro_platform']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
