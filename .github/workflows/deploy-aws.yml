name: Deploy API to AWS EC2

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - '.github/workflows/deploy-aws.yml'
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            cd /home/ec2-user/app

            # Pull latest code
            if [ -d "distro-platform" ]; then
              cd distro-platform
              git pull origin main
            else
              git clone https://github.com/ganeshkute18/distro-platform.git
              cd distro-platform
            fi

            # Copy env
            cp /home/ec2-user/app/.env apps/api/.env

            # Build and deploy
            docker build --target production -f apps/api/Dockerfile -t distro-api:latest .
            docker stop distro-api 2>/dev/null || true
            docker rm distro-api 2>/dev/null || true
            docker run -d \
              --name distro-api \
              --restart unless-stopped \
              --env-file apps/api/.env \
              -p 4000:4000 \
              distro-api:latest

            # Wait for healthy
            for i in $(seq 1 20); do
              if curl -sf http://localhost:4000/health > /dev/null 2>&1; then
                echo "✅ Deployment successful!"
                exit 0
              fi
              sleep 3
            done

            echo "❌ Healthcheck failed"
            docker logs distro-api --tail 30
            exit 1
