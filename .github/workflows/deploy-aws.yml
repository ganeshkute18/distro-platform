name: Deploy API to AWS EC2

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - '.github/workflows/deploy-aws.yml'
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_ROOT="/home/ec2-user/app"
            REPO_DIR="${APP_ROOT}/distro-platform"
            REPO_URL="https://github.com/ganeshkute18/distro-platform.git"

            # Persistent env lives outside the repo (never touched by git clean)
            if [ -f "${APP_ROOT}/.env" ]; then
              ENV_FILE="${APP_ROOT}/.env"
            elif [ -f "/home/ec2-user/.env" ]; then
              ENV_FILE="/home/ec2-user/.env"
            else
              echo "❌ Missing env file: ${APP_ROOT}/.env or /home/ec2-user/.env"
              exit 1
            fi

            mkdir -p "${APP_ROOT}"

            # Deployment-safe sync: EC2 must mirror GitHub main exactly
            if [ -d "${REPO_DIR}/.git" ]; then
              cd "${REPO_DIR}"
              git fetch origin main
              git reset --hard origin/main
              git clean -fd
            else
              rm -rf "${REPO_DIR}"
              git clone --branch main --single-branch "${REPO_URL}" "${REPO_DIR}"
              cd "${REPO_DIR}"
            fi

            echo "Deployed commit: $(git rev-parse --short HEAD)"

            # Inject runtime config after clean sync (apps/api/.env is gitignored)
            cp "${ENV_FILE}" apps/api/.env

            # Build and deploy
            docker build --target production -f apps/api/Dockerfile -t distro-api:latest .
            docker stop distro-api 2>/dev/null || true
            docker rm distro-api 2>/dev/null || true
            docker run -d \
              --name distro-api \
              --restart unless-stopped \
              --env-file apps/api/.env \
              -p 4000:4000 \
              distro-api:latest

            # Wait for healthy
            for i in $(seq 1 20); do
              if curl -sf http://localhost:4000/health > /dev/null 2>&1; then
                echo "✅ Deployment successful!"
                exit 0
              fi
              sleep 3
            done

            echo "❌ Healthcheck failed"
            docker logs distro-api --tail 30
            exit 1
