# render.yaml — Render.com deployment config
# Docs: https://render.com/docs/render-yaml-reference
#
# This deploys the NestJS API as a Web Service on Render's free tier.
# The Next.js frontend is deployed separately on Vercel (see DEPLOY_GUIDE.md).

services:
  - type: web
    name: distro-api
    runtime: node
    region: oregon  # change to: frankfurt, singapore, ohio
    plan: free      # free tier: 750 hrs/month, spins down after 15min inactivity
    rootDir: apps/api
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/main
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: "10000"        # Render assigns port via $PORT, but set fallback
      - key: API_PREFIX
        value: api/v1
      - key: DATABASE_URL
        fromDatabase:
          name: distro-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true   # Render auto-generates a secure random value
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: "15m"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "7d"
      - key: CORS_ORIGINS
        value: https://distro-platform.vercel.app  # UPDATE after Vercel deploy
      - key: FRONTEND_URL
        value: https://distro-platform.vercel.app  # UPDATE after Vercel deploy
      - key: RESEND_API_KEY
        sync: false  # You will paste this manually in Render dashboard
      - key: EMAIL_FROM
        value: "DistroPro <onboarding@resend.dev>"

databases:
  - name: distro-db
    databaseName: distro_platform
    plan: free   # free tier: 1GB storage, expires after 90 days
    region: oregon
