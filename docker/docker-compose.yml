version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: distro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: distro_platform
      POSTGRES_USER: distro_user
      POSTGRES_PASSWORD: distro_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U distro_user -d distro_platform']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: distro_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://distro_user:distro_pass@postgres:5432/distro_platform
      NODE_ENV: development
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/src
      - /app/node_modules

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: distro_web
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
      NODE_ENV: development
    ports:
      - '3000:3000'
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
